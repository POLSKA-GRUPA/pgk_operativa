pr: 6
fecha: "2026-04-16"
titulo: "Paso 5 - Descomposición nodos.py: helpers deterministas por módulo + tests de regresión"
archivos:
  # Fiscal: port de 3 helpers puros (sin deps pesadas) desde nodos.py origen
  - target: src/pgk_operativa/nodos/fiscal.py
    relacion: adaptado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos:
        - "_analisis_fiscal_basico"
        - "_extraer_fuentes_de_respuesta"
        - "_extraer_recomendaciones"
    notas: |
      Paso 5 Semana 3. Se portan tres helpers deterministas del nodo
      fiscal origen: fallback de analisis, extractor de fuentes
      (BOE, Ley, RD, Articulo, Convenio, Modelo 210, IRNR) y
      extractor de recomendaciones (recomiendo, debe, importante).
      `nodo_fiscal` ahora enriquece la salida con `fuentes_citadas` y
      `recomendaciones` calculadas sobre la respuesta LLM. El nombre
      publico pierde el guion bajo porque dejan de ser privados del
      nodo y pasan a ser API del modulo. Comportamiento identico al
      origen verificable con tests de regresion.

  # Contable: port de 5 helpers deterministas
  - target: src/pgk_operativa/nodos/contable.py
    relacion: adaptado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos:
        - "_analisis_contable_basico"
        - "_extraer_fuentes_edu"
        - "_extraer_asientos"
        - "_extraer_modelos"
        - "_extraer_pasos_aon"
    notas: |
      Paso 5 Semana 3. Se portan 5 helpers deterministas del nodo Edu
      (asesor contable). `nodo_contable` enriquece la salida con
      `fuentes_citadas`, `asientos_detectados`, `modelos_detectados`
      y `pasos_aon`. Mantiene la tupla de 12 modelos AEAT del
      origen (303, 130, 131, 210, 200, 202, 349, 390, 100, 111, 115,
      347). Integracion real con conta-pgk-hispania queda para Paso
      12.

  # Legal: port de 2 helpers deterministas
  - target: src/pgk_operativa/nodos/legal.py
    relacion: adaptado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos:
        - "_analisis_legal_basico"
        - "_extraer_fuentes_legales"
    notas: |
      Paso 5 Semana 3. Se portan 2 helpers del nodo German. El
      extractor de fuentes cubre 18 patrones (Ley, BOE, RD, Art.,
      STS, STSJ, STC, Codigo Civil, LEC, LJCA, LPAC, CC, CCom, etc.).
      Integracion con skill de verificacion juridica documental
      queda para Fase 4.

  # Modulos sin helpers portables: documentados como thin wrappers
  - target: src/pgk_operativa/nodos/docs.py
    relacion: inspirado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos: ["nodo_paloma"]
    notas: |
      Paso 5: thin wrapper documentado. No se portan helpers en esta
      fase porque el nodo_paloma origen depende de integraciones no
      migrables ahora (PalomaEmailSystem, PgkDatabase, Drive,
      StateManager, rollback). Documentado en docstring.

  - target: src/pgk_operativa/nodos/calidad.py
    relacion: inspirado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos: ["nodo_jennifer"]
    notas: |
      Paso 5: thin wrapper documentado. El nodo_jennifer origen es
      mantenimiento de filesystem, no post-procesado de texto. Se
      deja para Fase 4 cuando se definan checks de calidad explicitos.

  - target: src/pgk_operativa/nodos/marketing.py
    relacion: inspirado
    origen:
      repo: PGK_Empresa_Autonoma
      path: src/agents/nodos.py
      simbolos: ["nodo_mark"]
    notas: |
      Paso 5: thin wrapper documentado. El nodo_mark origen delega a
      mark_agent.consultar_mark con PersonaBlend, no portado aun.
      Se portara en Fase 4.

  - target: src/pgk_operativa/nodos/laboral.py
    relacion: nuevo
    notas: |
      Paso 5: thin wrapper documentado. No hay equivalente en origen
      (laboral se resolvia por chat conversacional o fiscal). Aqui se
      trata como modulo tecnico independiente preparado para integrar
      pgk-laboral-desk en Fase 4.

  # Tests de regresion paralelos (requisito Paso 5 del CONSOLIDADO §44.3)
  - target: tests/test_nodos_helpers.py
    relacion: nuevo
    notas: |
      19 tests deterministas que capturan el comportamiento de los
      helpers portados. Cubren fiscal (6 tests), contable (8 tests),
      legal (4 tests) y shape de los 7 nodos como callables
      LangGraph (1 test). No invocan LLM: son snapshots de
      input->output que aseguran que el comportamiento post-port
      coincide con el pre-port. Si en el futuro se cambian los
      patrones de extraccion, estos tests fallan y se investiga si
      es intencional (refactor) o regresion (bug).
